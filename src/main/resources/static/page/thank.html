<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>感谢参与</title>
    <link rel="stylesheet" href="../css/layui.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/thank.css">
</head>
<body>
<div class="container thank-container">
    <div class="thank-icon">
        <i class="layui-icon layui-icon-face-smile"></i>
    </div>
    <h1 class="thank-title">衷心感谢您的参与！</h1>
    <p class="thank-message">
        您的宝贵意见将帮助我们不断改进产品和服务。
    </p>

    <button class="btn btn-success" onclick="window.close()">
        <i class="layui-icon layui-icon-home"></i> 关闭
    </button>

    <div class="social-sharing">
        <div class="social-title">分享给朋友</div>
        <div class="social-icons">
            <div class="social-icon"><i class="layui-icon layui-icon-login-wechat"></i></div>
            <div class="social-icon"><i class="layui-icon layui-icon-login-qq"></i></div>
            <div class="social-icon"><i class="layui-icon layui-icon-login-weibo"></i></div>
        </div>
    </div>
</div>

<script src="../layui.js"></script>
</body>
</html>
