<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册 - 问卷管理平台</title>
    <link rel="stylesheet" href="../css/layui.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
<div class="register-container">
    <div class="register-header">注册问卷管理平台</div>
    <div class="register-body">
        <form id="registerForm">
            <div class="input-group">
                <label for="regUsername">用户名</label>
                <input type="text" id="regUsername" class="input-control" placeholder="请输入用户名">
                <div id="usernameError" class="error-message"></div>
            </div>
            <div class="input-group">
                <label for="regUsername">电话号码</label>
                <input type="text" id="regPhone" class="input-control" placeholder="请输入电话号码">
                <div id="phoneError" class="error-message"></div>
            </div>
            <div class="input-group">
                <label for="regPassword">密码</label>
                <input type="password" id="regPassword" class="input-control" placeholder="请输入密码">
                <div id="passwordError" class="error-message"></div>
            </div>
            <div class="input-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" class="input-control" placeholder="请再次输入密码">
                <div id="confirmError" class="error-message"></div>
            </div>
            <br>
            <div class="text-center mt-20">
                <button type="button" id="registerBtn" class="btn btn-success">注册</button>
            </div>
        </form>
    </div>
    <div class="register-footer">
        已有账号？<a href="/page/login.html">立即登录</a>
    </div>
</div>

<script src="../layui.js"></script>
<script src="../js/app-config.js"></script>
<script>
    layui.use(['jquery', 'layer'], function(){
        var $ = layui.jquery;
        var layer = layui.layer;

        // 注册按钮点击事件
        $('#registerBtn').on('click', function() {
            var username = $('#regUsername').val().trim();
            var password = $('#regPassword').val().trim();
            var phone = $('#regPhone').val().trim();
            var confirmPassword = $('#confirmPassword').val().trim();

            // 验证输入
            if (!username) {
                $('#usernameError').text('请输入用户名').show();
                return;
            } else if (username.length < 4 || username.length > 16) {
                $('#usernameError').text('用户名长度应在4-16位之间').show();
                return;
            } else {
                $('#usernameError').hide();
            }

            if (!phone) {
                $('#phoneError').text('请输入电话号码').show();
                return;
            } else if (phone.length != 11) {
                $('#phoneError').text('电话号码长度应为11位').show();
                return;
            } else {
                $('#phoneError').hide();
            }

            if (!password) {
                $('#passwordError').text('请输入密码').show();
                return;
            } else if (password.length < 6 || password.length > 20) {
                $('#passwordError').text('密码长度应在6-20位之间').show();
                return;
            } else {
                $('#passwordError').hide();
            }

            if (password !== confirmPassword) {
                $('#confirmError').text('两次输入的密码不一致').show();
                return;
            } else {
                $('#confirmError').hide();
            }

            // 显示加载中
            var loadIndex = layer.load(1, {
                shade: [0.1, '#fff']
            });

            // 发送注册请求
            $.ajax({
                url: QuestConfig.apiUrl('/user/register'),
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    username: username,
                    password: password,
                    phone: phone
                }),
                success: function(res) {
                    layer.close(loadIndex);
                    if (res.code === 200) {
                        layer.msg('注册成功', {icon: 1});
                        // 自动跳转到登录页面
                        setTimeout(function() {
                            window.location.href = 'login.html';
                        }, 1000);
                    } else {
                        layer.msg(res.msg || '注册失败', {icon: 2});
                    }
                },
                error: function() {
                    layer.close(loadIndex);
                    layer.msg('网络错误，请稍后再试', {icon: 2});
                }
            });
        });

        // 回车注册
        $('#confirmPassword').on('keypress', function(e) {
            if (e.which === 13) {
                $('#registerBtn').click();
            }
        });
    });
</script>
</body>
</html>
