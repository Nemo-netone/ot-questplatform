spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quest_platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: ${DB_SSLMODE:prefer}
        currentSchema: ${DB_SCHEMA:ot_questplatform}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: postgresql
  reasonable: true

app:
  auth:
    secret: ${APP_AUTH_SECRET:change-me-in-production}
    token-ttl-seconds: ${APP_AUTH_TOKEN_TTL_SECONDS:86400}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,https://ot-questplatform.pages.dev}
